name: Update Data Daily

on:
  schedule:
    - cron: "30 2 * * *"   # 台灣時間每天 10:30
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-analyst-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Update JSON from Google Sheet CSV
        env:
          GOOGLE_SHEET_CSV_URL: "https://docs.google.com/spreadsheets/d/12g0ikHklbVfCc4jdes5YQdcxyjFzTFGaeLTyIvpdvMg/export?format=csv&gid=1581904899"
        run: python generate_data.py

      - name: Commit and push changes
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add client/src/data/analysts_by_date.json client/src/data/all_data.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "Update analyst data"
            git push
          fi
